<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Cartel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="css/styles.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-teal-50 text-gray-800 font-sans antialiased">

    <div id="app"></div>

    <div id="modal-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden transition-opacity"></div>
    <div id="modal" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-xl shadow-2xl z-50 w-full max-w-lg p-6 hidden max-h-[90vh] overflow-y-auto">
        </div>

    <div id="toast" class="hidden"></div>

    <script type="module">
        import { firebaseConfig, appId } from './js/firebase-config.js';
        window.__firebase_config = JSON.stringify(firebaseConfig);
        window.__app_id = appId;
        console.log("Firebase config loaded:", { appId, hasConfig: !!firebaseConfig });
    </script>
    
    <script type="module" src="app.js"></script>

</html>
